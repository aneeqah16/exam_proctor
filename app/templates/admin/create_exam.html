{% extends "base.html" %}
{% block title %}Create Exam — ExamProctor{% endblock %}

{% block body %}
<div class="app-wrapper">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">
                <i class="bi bi-shield-check me-2"></i>ExamProctor
            </div>
            <div class="brand-sub">Admin Panel</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Main</div>
            <a href="{{ url_for('admin.dashboard') }}" class="nav-link">
                <i class="bi bi-grid-1x2"></i> Dashboard
            </a>
            <a href="{{ url_for('admin.exams') }}" class="nav-link active">
                <i class="bi bi-journal-text"></i> Exams
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="{{ url_for('auth.logout') }}" class="nav-link">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <span class="topbar-title">
                <a href="{{ url_for('admin.exams') }}"
                   style="color:#1A5C52;text-decoration:none">
                    <i class="bi bi-chevron-left me-1"></i>Exams
                </a>
                &nbsp;/&nbsp; Create Exam
            </span>
        </div>

        <div class="page-body">
            <div class="page-header">
                <h4>Create Exam</h4>
                <p>Fill in the details below to create a new exam</p>
            </div>

            <div class="ep-card" style="max-width:600px">
                <div class="ep-card-header">
                    <h6><i class="bi bi-journal-plus"></i> New Exam</h6>
                </div>
                <div class="p-4">
                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Exam Title</label>
                            <input type="text" name="title" class="form-control"
                                   placeholder="e.g. Final Term: Computer Science"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Duration (minutes)</label>
                            <input type="number" name="duration" class="form-control"
                                   placeholder="60" min="5" max="300" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Scheduled Date & Time</label>
                            <input type="datetime-local" name="scheduled_at"
                                   class="form-control">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                {% for s in ['draft', 'scheduled', 'active', 'closed'] %}
                                <option value="{{ s }}">{{ s | capitalize }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-ep-primary">
                                <i class="bi bi-check-lg"></i> Create Exam
                            </button>
                            <a href="{{ url_for('admin.exams') }}"
                               class="btn-ep-secondary">
                                <i class="bi bi-x-lg"></i> Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
